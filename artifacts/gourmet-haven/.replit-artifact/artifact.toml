kind = "web"
previewPath = "/"
title = "Gourmet Haven"
version = "1.0.0"
id = "artifacts/gourmet-haven"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20609

[services.development]
run = "pnpm --filter @workspace/gourmet-haven run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gourmet-haven", "run", "build" ]
publicDir = "artifacts/gourmet-haven/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20609"
BASE_PATH = "/"
